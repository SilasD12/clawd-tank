; PlatformIO configuration for M5StickC Plus2
; Run from the firmware/ directory:
;   pio run                    (build)
;   pio run -t upload          (build + flash)
;   pio device monitor         (serial monitor)
;   pio run -t upload && pio device monitor   (flash + monitor)
;
; Board: esp32-pico-devkitm-2 (ESP32-PICO-V3-02, same chip as M5StickC Plus2)
; PlatformIO does not yet have a dedicated m5stick-c-plus2 board entry.

[env:m5stick-c-plus2]
platform = espressif32
board = esp32-pico-devkitm-2
framework = espidf

; Use the existing ESP-IDF main/ directory instead of PlatformIO's default src/
build_src_dir = main

; Serial monitor baud rate
monitor_speed = 115200

; Upload speed
upload_speed = 1500000
